name: recognitions
description: A production-ready real-time face recognition Flutter application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Camera
  camera: ^0.10.5+9

  # ML Kit Face Detection
  google_mlkit_face_detection: ^0.11.0

  # TFLite for MobileFaceNet embeddings (standalone — no helper package needed)
  tflite_flutter: ^0.12.1

  # Local Storage (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image processing
  image: ^4.1.7

  # Permissions
  permission_handler: ^11.3.0

  # Path provider
  path_provider: ^2.1.2

  # Utility
  uuid: ^4.3.3
  equatable: ^2.0.5
  flutter_spinkit: ^5.2.1
  google_fonts: ^6.2.1
  get_it: ^7.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  local_auth: ^2.1.6
  flutter_sound: ^9.2.13
  permission_handler: ^11.4.0
  flutter_tts: ^3.8.5

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/

  # Fonts are served by the google_fonts package at runtime (no local .ttf needed)
